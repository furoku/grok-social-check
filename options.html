<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>Grok Social Check — 設定</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 640px; margin: 24px auto; padding: 0 16px; }
      label { display: block; margin-top: 16px; font-weight: 600; }
      input, select { width: 100%; margin-top: 6px; padding: 8px; box-sizing: border-box; }
      button { margin-top: 20px; padding: 10px 16px; }
      .hint { color: #536471; font-size: 13px; margin-top: 6px; }
      #status { margin-top: 12px; font-size: 14px; }
    </style>
  </head>
  <body>
    <h1>Grok Social Check</h1>
    <p>X / Threads の投稿を Grok で参考分析します（公式ファクトチェックではありません）。</p>

    <label for="xaiToken">xAI API キー</label>
    <input id="xaiToken" type="password" autocomplete="off" />
    <p class="hint">キーは chrome.storage.sync にのみ保存し、リポジトリには含めません。</p>

    <label for="model">モデル</label>
    <select id="model">
      <option value="grok-4-1-fast-non-reasoning">grok-4-1-fast-non-reasoning</option>
      <option value="grok-3-mini">grok-3-mini</option>
    </select>

    <button id="save">保存</button>
    <div id="status"></div>
    <script src="options.js"></script>
  </body>
</html>
